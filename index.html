<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tumble Tier – Online Multiplayer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: #0a0a14; color: #fff;
    font-family: 'Segoe UI', Arial, sans-serif;
    height: 100%; width: 100%;
    overflow: hidden; touch-action: none;
  }
  #shell { position: fixed; inset: 0; display: flex; justify-content: center; align-items: center; }
  #canvas-wrap { position: relative; }
  #g {
    display: block; background: #0a0a14;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    user-select: none; -webkit-user-select: none;
  }
  #ui-layer {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    background: #0a0a14; z-index: 10;
  }
  #ui-layer.hidden { display: none; }
  .panel {
    background: #16162a; padding: 28px 32px;
    border-radius: 14px; border: 1.5px solid #2a2a46;
    text-align: center; width: min(380px, 90%);
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  }
  h1 { color: #32cd50; text-shadow: 0 0 14px #32cd5088; margin: 0 0 6px; font-size: 2rem; letter-spacing: 2px; }
  h2 { margin: 0 0 16px; color: #c0c0d8; }
  p  { color: #8888aa; margin: 4px 0 16px; font-size: 0.9rem; }
  hr { border: none; border-top: 1px solid #2a2a46; margin: 18px 0; }
  .inp {
    width: 100%; padding: 11px 14px; margin: 6px 0;
    border-radius: 8px; border: 1px solid #3a3a58;
    background: #0a0a14; color: #fff; font-size: 15px;
    text-align: center; text-transform: uppercase; letter-spacing: 1px;
    outline: none; transition: border-color .2s;
  }
  .inp:focus { border-color: #3c82ff; }
  .btn {
    background: #3c82ff; color: #fff; border: none;
    padding: 11px 22px; font-size: 15px; border-radius: 8px;
    cursor: pointer; font-weight: 700; margin: 5px;
    width: calc(100% - 10px);
    transition: background .15s, transform .1s; letter-spacing: .5px;
  }
  .btn:active { transform: scale(.97); }
  .btn.green { background: #32cd50; }
  .btn.green:hover { background: #3de060; }
  .btn:not(.green):hover { background: #5a95ff; }
  .player-list { list-style: none; padding: 0; margin: 12px 0; text-align: left; }
  .player-list li { padding: 9px 12px; background: #0a0a14; border-radius: 6px; margin-bottom: 4px; font-size: 0.9rem; }
  #lobby-panel  { display: none; }
  #loading-panel{ display: none; }
</style>
</head>
<body>

<div id="shell">
  <div id="canvas-wrap">
    <div id="ui-layer">
      <div id="menu-panel" class="panel">
        <h1>TUMBLE TIER</h1>
        <p>Online Multiplayer Edition</p>
        <input class="inp" type="text" id="playerName" placeholder="Your Name" maxlength="12">
        <button class="btn green" id="btn-create">Create Game Room</button>
        <hr>
        <input class="inp" type="text" id="roomCode" placeholder="4-Letter Room Code" maxlength="4">
        <button class="btn" id="btn-join">Join Game</button>
      </div>
      <div id="lobby-panel" class="panel">
        <h1>Room: <span id="display-room-code" style="color:#fff;letter-spacing:3px"></span></h1>
        <p>Waiting for players to join…</p>
        <ul class="player-list" id="lobby-players"></ul>
        <button class="btn green" id="btn-start" style="display:none">▶ Start Game</button>
      </div>
      <div id="loading-panel" class="panel"><h2>Connecting…</h2></div>
    </div>
    <canvas id="g"></canvas>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

<script type="module">
import { initializeApp }      from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, arrayUnion }
                               from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

// ── Firebase ─────────────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyDWoEB3qb7V5VYghlsykbdw0UUeLrZDjGw",
  authDomain: "tumble-tier.firebaseapp.com",
  projectId: "tumble-tier",
  storageBucket: "tumble-tier.firebasestorage.app",
  messagingSenderId: "388971747224",
  appId: "1:388971747224:web:6bb865fc7ab66ca7853ded",
};
const app  = initializeApp(firebaseConfig);
const db   = getFirestore(app);
const auth = getAuth(app);

// ── Deterministic Mulberry32 RNG ──────────────────────────────────────────────
function seedToInt(str) {
  let h = 0x12345678;
  for (let i = 0; i < str.length; i++) {
    h = Math.imul(h ^ str.charCodeAt(i), 0x9e3779b9);
    h = (h << 13) | (h >>> 19);
  }
  return h >>> 0;
}
function makePRNG(seed) {
  let s = seedToInt(seed);
  return () => {
    s = (s + 0x6d2b79f5) >>> 0;
    let t = Math.imul(s ^ (s >>> 15), 1 | s);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) >>> 0;
    return ((t ^ (t >>> 14)) >>> 0) / 0xffffffff;
  };
}
let rng = makePRNG('init');

// ── Game Constants ────────────────────────────────────────────────────────────
const CW = 900, CH = 900;
const BX = 132, BY = 185, BW = 636, BH = 614;
const BALL_R = 8, PEG_R = 4, PEG_DX = 31, PEG_DY = 36, PEG_ROWS = 12, PEG_OFF = 70;
const N_SLOTS = 9, SLOT_W = Math.floor(BW / N_SLOTS), ZONE_H = 75, ZONE_Y = BH - ZONE_H;
const HX = BX + BW / 2, HY = BY + 20;
const SETTLE_F = 45, TIMEOUT_MS = 15000, PWR_PERIOD = 2000;
// Fixed physics timestep: identical step size on every client regardless of frame rate
const PHYS_STEP = 1000 / 120;
const PCOL = ['#f0b428','#50aeff','#c864ff','#ff8746'];

const ZONES = [
  { col:'green', pts: 1, eff:'go_again',      lbl:'GO AGAIN' },
  { col:'blue',  pts:-1, eff:'end_turn',       lbl:'END TURN' },
  { col:'red',   pts: 0, eff:'eliminated',     lbl:'ELIM!'    },
  { col:'green', pts: 2, eff:'go_again',       lbl:'GO AGAIN' },
  { col:'blue',  pts: 0, eff:'swap_scores',    lbl:'SWAP'     },
  { col:'red',   pts: 0, eff:'lose_next_turn', lbl:'SKIP TURN'},
  { col:'green', pts: 3, eff:'go_again',       lbl:'GO AGAIN' },
  { col:'blue',  pts: 1, eff:'go_again',       lbl:'GO AGAIN' },
  { col:'red',   pts: 0, eff:'reset_score',    lbl:'RESET'    },
];
const ZBG = { green:'#1a5229', blue:'#152060', red:'#5a151a' };
const ZFG = { green:'#32cd50', blue:'#3c82ff', red:'#e03737' };
const BCOL= { green:'#32cd50', blue:'#3c82ff', red:'#e03737' };

// ── DOM ───────────────────────────────────────────────────────────────────────
const canvasWrap = document.getElementById('canvas-wrap');
const uiLayer    = document.getElementById('ui-layer');
const canvas     = document.getElementById('g');
canvas.width = CW; canvas.height = CH;
const ctx = canvas.getContext('2d');

// ── Responsive scaling ────────────────────────────────────────────────────────
// The canvas is always CW×CH logical px. We scale the wrapper to fit the viewport.
// fs(n) scales a canvas font size so it appears at n CSS px after the scale-down.
const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
let currentScale = 1;
const fs = n => Math.round(n / currentScale);

function applyScale() {
  const pad = 8;
  const maxW = window.innerWidth  - pad * 2;
  const maxH = window.innerHeight - pad * 2;
  currentScale = Math.min(maxW / CW, maxH / CH, 1);
  canvasWrap.style.width  = CW + 'px';
  canvasWrap.style.height = CH + 'px';
  canvasWrap.style.transformOrigin = 'top left';
  canvasWrap.style.transform  = `scale(${currentScale})`;
  canvasWrap.style.marginLeft = Math.round((window.innerWidth  - CW * currentScale) / 2) + 'px';
  canvasWrap.style.marginTop  = Math.round((window.innerHeight - CH * currentScale) / 2) + 'px';
}
applyScale();
window.addEventListener('resize', applyScale);
window.addEventListener('orientationchange', () => setTimeout(applyScale, 200));

// ── Pointer → logical canvas coords ──────────────────────────────────────────
function toLogical(clientX, clientY) {
  const r = canvasWrap.getBoundingClientRect();
  return [(clientX - r.left) * (CW / r.width), (clientY - r.top) * (CH / r.height)];
}

// ── App state ─────────────────────────────────────────────────────────────────
let myUid = null, currentRoom = null, isHost = false, unsubscribe = null;
let fbState = { status:'menu', players:[], turnIndex:0 };

const S = { WAIT:'wait', CHARGE:'charge', FLIGHT:'flight', RESULT:'result' };
let localState = S.WAIT;
let resMsg = '', resSlot = 0, ballCol = 'green';
let aimX = HX, power = 0, chargeStart = null;

// Kept separate from fbState so Firestore snapshot reassignment doesn't reset it
let lastLaunchId = null;

// ── Firebase auth ─────────────────────────────────────────────────────────────
signInAnonymously(auth).then(u => { myUid = u.user.uid; })
  .catch(() => alert('Auth failed. Check Firebase settings.'));

// ── Panel helpers ─────────────────────────────────────────────────────────────
function showPanel(id) {
  document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
  if (id) document.getElementById(id).style.display = 'block';
}
function generateCode() {
  return Math.random().toString(36).substring(2, 6).toUpperCase();
}

// ── Create / Join / Start ─────────────────────────────────────────────────────
document.getElementById('btn-create').onclick = async () => {
  const name = document.getElementById('playerName').value.trim() || 'Host';
  currentRoom = generateCode(); isHost = true;
  await setDoc(doc(db, 'games', currentRoom), {
    status:'lobby', turnIndex:0,
    players:[{ uid:myUid, name, color:PCOL[0], score:0, active:true, skipNext:false }],
    lastLaunch:null, lastResult:null,
  });
  document.getElementById('display-room-code').innerText = currentRoom;
  document.getElementById('btn-start').style.display = 'block';
  showPanel('lobby-panel');
  listenToRoom();
};

document.getElementById('btn-join').onclick = async () => {
  const name = document.getElementById('playerName').value.trim() || 'Player';
  const code = document.getElementById('roomCode').value.toUpperCase();
  if (!code) return;
  const snap = await getDoc(doc(db, 'games', code));
  if (snap.exists() && snap.data().status === 'lobby') {
    currentRoom = code;
    const cur = snap.data().players;
    if (cur.length >= 4) return alert('Room is full!');
    await updateDoc(doc(db, 'games', code), {
      players: arrayUnion({ uid:myUid, name, color:PCOL[cur.length], score:0, active:true, skipNext:false }),
    });
    showPanel('lobby-panel');
    listenToRoom();
  } else {
    alert('Room not found or game already started.');
  }
};

document.getElementById('btn-start').onclick = async () => {
  if (isHost) await updateDoc(doc(db, 'games', currentRoom), { status:'playing' });
};

// ── Realtime sync ─────────────────────────────────────────────────────────────
function listenToRoom() {
  if (unsubscribe) unsubscribe();
  unsubscribe = onSnapshot(doc(db, 'games', currentRoom), snap => {
    const data = snap.data(); if (!data) return;
    fbState = data;

    // Update lobby list
    if (fbState.status === 'lobby') {
      document.getElementById('lobby-players').innerHTML =
        fbState.players.map(p => `<li><strong style="color:${p.color}">${p.name}</strong></li>`).join('');
    }

    // Game start
    if (fbState.status === 'playing' && !uiLayer.classList.contains('hidden')) {
      uiLayer.classList.add('hidden');
      buildWorld();
      lastT = null;
      requestAnimationFrame(loop);
    }

    // New launch — guard with lastLaunchId so snapshot re-fires don't re-launch
    if (fbState.lastLaunch && fbState.lastLaunch.id !== lastLaunchId) {
      lastLaunchId = fbState.lastLaunch.id;
      const l = fbState.lastLaunch;
      rng = makePRNG(l.seed);   // same seed → identical RNG sequence on every client
      ballCol = l.ballCol;
      triggerLocalLaunch(l.x, l.power);
    }

    // Result arrived — snap ball to the correct slot on ALL screens
    if (fbState.lastResult && localState === S.FLIGHT) {
      resSlot = fbState.lastResult.slot;
      resMsg  = fbState.lastResult.msg;
      if (ball) {
        Body.setPosition(ball, { x: BX + resSlot * SLOT_W + SLOT_W / 2, y: BY + ZONE_Y + ZONE_H / 2 });
        Body.setVelocity(ball, { x: 0, y: 0 });
      }
      localState = S.RESULT;
    }
  });
}

// ── Physics ───────────────────────────────────────────────────────────────────
const { Engine, World, Bodies, Body } = Matter;
let eng, world, ball, pegs = [];
let settleT = 0, lastSlot = null, flightMs = 0, turnEvaluated = false, physAccum = 0;

function buildWorld() {
  eng = Engine.create(); eng.gravity.y = 0.5; eng.gravity.scale = 0.001;
  world = eng.world; ball = null; pegs = [];
  const WO = { isStatic:true, restitution:0.3, friction:0.5 };
  const T = 22;
  World.add(world, [
    Bodies.rectangle(BX - T/2,      BY + BH/2,     T,  BH, WO),
    Bodies.rectangle(BX + BW + T/2, BY + BH/2,     T,  BH, WO),
    Bodies.rectangle(BX + BW/2,     BY + BH + T/2, BW, T,  WO),
    Bodies.rectangle(BX + BW/2,     BY - T/2,      BW, T,  WO),
  ]);
  const zt = BY + ZONE_Y, zh = BY + BH - zt;
  for (let i = 1; i < N_SLOTS; i++)
    World.add(world, Bodies.rectangle(BX + i*SLOT_W, zt + zh/2, 4, zh,
      { isStatic:true, restitution:0.15, friction:0.6 }));
  for (let row = 0; row < PEG_ROWS; row++) {
    const py = BY + PEG_OFF + row * PEG_DY;
    const ox = (row % 2 === 1) ? PEG_DX / 2 : 0;
    let px = BX + PEG_DX + ox;
    while (px + PEG_R < BX + BW - PEG_R) {
      const p = Bodies.circle(px, py, PEG_R, { isStatic:true, restitution:0.76, friction:0.25 });
      pegs.push(p); World.add(world, p); px += PEG_DX;
    }
  }
}

function triggerLocalLaunch(ax, pwr) {
  if (ball) { World.remove(world, ball); ball = null; }
  const side = ax > HX ? 1 : (ax < HX ? -1 : (rng() > 0.5 ? 1 : -1));
  const vx   = (ax - HX) * 0.025 * pwr + side * (0.5 + rng() * 1.0);
  ball = Bodies.circle(ax, HY, BALL_R, { restitution:0.76, friction:0.18, frictionAir:0.003 });
  Body.setVelocity(ball, { x: vx, y: 0 });
  World.add(world, ball);
  settleT = 0; lastSlot = null; flightMs = 0;
  turnEvaluated = false; physAccum = 0;
  localState = S.FLIGHT;
}

function unstick() {
  if (!ball) return;
  const { x, y } = ball.position, v = ball.velocity;
  if (y >= BY + PEG_OFF - 5 && y <= BY + ZONE_Y && Math.hypot(v.x, v.y) < 0.7) {
    // Direction based on position so it's identical on all clients
    const k = (x < HX ? 1 : -1) * 2.8;
    Body.setVelocity(ball, { x: v.x + k, y: Math.max(v.y, 2.8) });
  }
}

// ── Turn evaluation (active player only writes result to Firestore) ────────────
const curPlayer = () => fbState.players[fbState.turnIndex];
const isMyTurn  = () => curPlayer()?.uid === myUid && localState === S.WAIT;

function evaluateTurn(slot) {
  if (curPlayer()?.uid !== myUid || turnEvaluated) return;
  turnEvaluated = true;

  const z = ZONES[slot];
  const players = JSON.parse(JSON.stringify(fbState.players));
  const p = players[fbState.turnIndex];
  const parts = [];

  p.score += z.pts;
  if (z.pts > 0) parts.push(`+${z.pts} PT${z.pts > 1 ? 'S' : ''}`);
  else if (z.pts < 0) parts.push(`${z.pts} PT`);

  let goAgain = false;
  switch (z.eff) {
    case 'go_again':       goAgain = true; parts.push('Go Again!'); break;
    case 'end_turn':       parts.push('End Turn.'); break;
    case 'eliminated':     p.active = false; parts.push(`${p.name} Eliminated!`); break;
    case 'lose_next_turn': p.skipNext = true; parts.push('Lose Next Turn!'); break;
    case 'reset_score':    p.score = 0; parts.push('Score Reset!'); break;
    case 'swap_scores': {
      const others = players.filter((x, i) => x.active && i !== fbState.turnIndex);
      if (others.length) {
        const t = others[Math.floor(Math.random() * others.length)];
        [p.score, t.score] = [t.score, p.score];
        parts.push('Scores Swapped!');
      }
      break;
    }
  }

  const stillActive = players.filter(x => x.active);
  let nextIdx = fbState.turnIndex;
  if (!goAgain) {
    for (let i = 0; i < players.length; i++) {
      nextIdx = (nextIdx + 1) % players.length;
      if (!players[nextIdx].active) continue;
      if (players[nextIdx].skipNext) { players[nextIdx].skipNext = false; continue; }
      break;
    }
  }

  updateDoc(doc(db, 'games', currentRoom), {
    players, turnIndex: nextIdx,
    lastResult: { slot, msg: parts.join('  ') },
    ...(stillActive.length <= 1 ? { status:'over', winnerUid: stillActive[0]?.uid || null } : {}),
  });
}

// ── Input ─────────────────────────────────────────────────────────────────────
function updateAim(clientX, clientY) {
  const [lx] = toLogical(clientX, clientY);
  aimX = Math.max(BX + BALL_R + 4, Math.min(BX + BW - BALL_R - 4, lx));
}

canvas.addEventListener('mousemove', e => {
  if (localState === S.WAIT || localState === S.CHARGE) updateAim(e.clientX, e.clientY);
});
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  if (localState === S.WAIT || localState === S.CHARGE) updateAim(t.clientX, t.clientY);
  actionDown();
}, { passive:false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  if (localState === S.WAIT || localState === S.CHARGE) updateAim(t.clientX, t.clientY);
}, { passive:false });
canvas.addEventListener('touchend',  e => { e.preventDefault(); actionUp(); }, { passive:false });
document.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); actionDown(); } });
document.addEventListener('keyup',   e => { if (e.code === 'Space') { e.preventDefault(); actionUp();   } });

function actionDown() {
  if (localState === S.RESULT) {
    if (ball) { World.remove(world, ball); ball = null; }
    localState = S.WAIT;
    return;
  }
  if (isMyTurn()) { localState = S.CHARGE; chargeStart = performance.now(); }
}
function actionUp() {
  if (localState !== S.CHARGE) return;
  const seed    = Date.now().toString(36) + Math.floor(Math.random() * 1e9).toString(36);
  const randCol = ['green','blue','red'][Math.floor(Math.random() * 3)];
  updateDoc(doc(db, 'games', currentRoom), {
    lastLaunch: { x:aimX, power, id:Date.now(), seed, ballCol:randCol },
    lastResult: null,
  });
}

// ── Render helpers ────────────────────────────────────────────────────────────
function rr(x,y,w,h,r) {
  const R = Math.min(r,w/2,h/2);
  ctx.beginPath();
  ctx.moveTo(x+R,y); ctx.lineTo(x+w-R,y); ctx.quadraticCurveTo(x+w,y,x+w,y+R);
  ctx.lineTo(x+w,y+h-R); ctx.quadraticCurveTo(x+w,y+h,x+w-R,y+h);
  ctx.lineTo(x+R,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-R);
  ctx.lineTo(x,y+R); ctx.quadraticCurveTo(x,y,x+R,y);
  ctx.closePath();
}
function fillRR(x,y,w,h,r,s){ctx.fillStyle=s;rr(x,y,w,h,r);ctx.fill();}
function strokeRR(x,y,w,h,r,s,lw){ctx.strokeStyle=s;ctx.lineWidth=lw||1.5;rr(x,y,w,h,r);ctx.stroke();}
function txt(s,x,y,col,font,align='center',base='middle'){
  ctx.fillStyle=col;ctx.font=font;ctx.textAlign=align;ctx.textBaseline=base;ctx.fillText(s,x,y);
}

function drawBoard() {
  ctx.fillStyle='#1c1c30'; ctx.fillRect(BX,BY,BW,BH);
  ctx.fillStyle='#262640'; ctx.fillRect(BX,BY,BW,PEG_OFF);
  const zy = BY + ZONE_Y;
  ZONES.forEach((z,i) => {
    const zx = BX+i*SLOT_W, cx = zx+SLOT_W/2;
    fillRR(zx,zy,SLOT_W,ZONE_H,0,ZBG[z.col]);
    strokeRR(zx+.5,zy+.5,SLOT_W-1,ZONE_H-1,0,ZFG[z.col]+'88',1);
    if (z.pts !== 0) txt(z.pts>0?`+${z.pts}`:`${z.pts}`, cx, zy+18, '#fff', `bold ${fs(13)}px Arial`);
    if (currentScale > 0.52) txt(z.lbl, cx, zy+ZONE_H-11, '#aaa', `${fs(9)}px Arial`);
  });
  ctx.strokeStyle='rgba(160,160,200,.4)'; ctx.lineWidth=2;
  [3,6].forEach(s => {
    const sx = BX+s*SLOT_W;
    ctx.beginPath(); ctx.moveTo(sx,zy-8); ctx.lineTo(sx,BY+BH); ctx.stroke();
  });
  [0,1,2].forEach(lv => {
    txt(`L${lv+1}`, BX+(lv*3+1)*SLOT_W+SLOT_W/2, zy-9, 'rgba(160,160,180,.7)', `${fs(11)}px Arial`);
  });
  ctx.shadowBlur=5; ctx.shadowColor='rgba(200,210,230,.5)'; ctx.fillStyle='#d0d0e8';
  pegs.forEach(p => { ctx.beginPath(); ctx.arc(p.position.x,p.position.y,PEG_R,0,Math.PI*2); ctx.fill(); });
  ctx.shadowBlur=0;
  strokeRR(BX,BY,BW,BH,0,'rgba(150,150,180,.4)',2);
}

function drawScores() {
  const n=fbState.players.length, pw=Math.min(200,(CW-20)/n), sx=(CW-pw*n)/2;
  ctx.shadowBlur=8; ctx.shadowColor='#32cd50';
  txt('ROOM: '+currentRoom, CW/2, 18, '#6060a0', `bold ${fs(13)}px Arial`);
  ctx.shadowBlur=0;
  fbState.players.forEach((p,i) => {
    const px=sx+i*pw, isCur=i===fbState.turnIndex, col=p.active?p.color:'#444455';
    fillRR(px+4,32,pw-8,142,9,isCur?'#2e2e4a':'#1c1c30');
    strokeRR(px+4,32,pw-8,142,9,isCur?col:'#363650',isCur?2.5:1);
    txt(p.name,  px+pw/2, 52,  col, `bold ${fs(13)}px Arial`);
    txt(p.score, px+pw/2, 96,  col, `bold ${fs(30)}px Arial`);
    const badge = !p.active ? 'ELIMINATED'
      : p.skipNext ? 'SKIP NEXT'
      : isCur ? (localState===S.CHARGE ? 'CHARGING…' : 'YOUR TURN ▼')
      : 'waiting…';
    const bc = !p.active ? ZFG.red : p.skipNext ? ZFG.blue
      : isCur ? ZFG.green : '#505060';
    txt(badge, px+pw/2, 133, bc, `${fs(11)}px Arial`);
  });
}

function drawPwrBar(y) {
  const bx=BX+20, bw=BW-40, bh=14;
  fillRR(bx,y,bw,bh,4,'#252538');
  if (power > 0) {
    ctx.save(); rr(bx,y,bw,bh,4); ctx.clip();
    const g=ctx.createLinearGradient(bx,0,bx+bw,0);
    g.addColorStop(0,'#22cc44'); g.addColorStop(.5,'#ddcc22'); g.addColorStop(1,'#cc2222');
    ctx.fillStyle=g; ctx.fillRect(bx+2,y+2,(bw-4)*power,bh-4);
    ctx.restore();
  }
  strokeRR(bx,y,bw,bh,4,'#444455',1);
  txt('POWER', bx-7, y+bh/2, '#444455', `bold ${fs(10)}px Arial`, 'right', 'middle');
}

// ── Main loop ─────────────────────────────────────────────────────────────────
let lastT = null;
function loop(ts) {
  // Keep looping so game-over overlay continues to render
  if (fbState.status !== 'playing' && fbState.status !== 'over') return;
  requestAnimationFrame(loop);
  const dt = lastT ? Math.min(ts - lastT, 50) : PHYS_STEP; lastT = ts;

  if (localState === S.CHARGE && chargeStart !== null)
    power = (Math.sin((ts - chargeStart) / PWR_PERIOD * Math.PI*2 - Math.PI/2) + 1) / 2;

  if (localState === S.FLIGHT && ball) {
    // Fixed-step accumulator: same simulated time per real second on every device
    physAccum += dt;
    while (physAccum >= PHYS_STEP) {
      Engine.update(eng, PHYS_STEP);
      physAccum -= PHYS_STEP;
    }
    unstick();
    flightMs += dt;

    const { x, y } = ball.position;
    if (y >= BY + ZONE_Y + BALL_R*2) {
      const slot = Math.max(0, Math.min(N_SLOTS-1, Math.floor((x - BX) / SLOT_W)));
      if (slot !== lastSlot) { lastSlot = slot; settleT = 0; }
      if (++settleT >= SETTLE_F) evaluateTurn(slot);
    } else {
      settleT = 0; lastSlot = null;
    }

    if (flightMs >= TIMEOUT_MS && !turnEvaluated) {
      const slot = Math.max(0, Math.min(N_SLOTS-1, Math.floor((ball.position.x - BX) / SLOT_W)));
      evaluateTurn(slot);
    }
  }

  // ── Draw ────────────────────────────────────────────────────────────────────
  ctx.fillStyle='#0a0a14'; ctx.fillRect(0,0,CW,CH);
  drawBoard(); drawScores();

  // Aim cursor (only for current player during WAIT / CHARGE)
  if ((localState===S.WAIT || localState===S.CHARGE) && isMyTurn()) {
    const col = curPlayer().color;
    ctx.save(); ctx.setLineDash([5,5]);
    ctx.strokeStyle=col+'88'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(aimX,BY+2); ctx.lineTo(aimX,BY+PEG_OFF-6); ctx.stroke();
    ctx.restore();
    ctx.fillStyle=col;
    ctx.beginPath(); ctx.moveTo(aimX,BY+PEG_OFF+2); ctx.lineTo(aimX-9,BY+PEG_OFF-13); ctx.lineTo(aimX+9,BY+PEG_OFF-13); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.arc(aimX,BY+9,5,0,Math.PI*2); ctx.fill();
  }

  // Ball
  if (ball) {
    ctx.shadowBlur=12; ctx.shadowColor=BCOL[ballCol];
    ctx.fillStyle=BCOL[ballCol];
    ctx.beginPath(); ctx.arc(ball.position.x,ball.position.y,BALL_R,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle='rgba(255,255,255,.35)';
    ctx.beginPath(); ctx.arc(ball.position.x-BALL_R*.3,ball.position.y-BALL_R*.4,BALL_R*.28,0,Math.PI*2); ctx.fill();
  }

  // Bottom bar
  const boty = BY + BH;
  fillRR(BX, boty+6, BW, 72, 8, '#16162a');
  if (localState === S.RESULT) {
    strokeRR(BX, boty+6, BW, 72, 8, ZFG[ZONES[resSlot].col], 2);
    txt(resMsg, CW/2, boty+28, ZFG[ZONES[resSlot].col], `bold ${fs(18)}px Arial`);
    txt(isMobile?'Tap to continue':'TAP / SPACE to continue', CW/2, boty+56, '#55558a', `${fs(12)}px Arial`);
  } else if (localState === S.CHARGE) {
    txt(isMobile?'Lift to drop!':'Release SPACE to drop!', CW/2, boty+26, curPlayer()?.color||'#fff', `bold ${fs(15)}px Arial`);
    drawPwrBar(boty+44);
  } else if (localState === S.FLIGHT) {
    txt('Ball in flight…', CW/2, boty+42, '#555566', `${fs(15)}px Arial`);
  } else {
    const hint = isMyTurn()
      ? (isMobile ? 'YOUR TURN – slide to aim  ·  tap & hold  ·  lift to drop'
                  : 'YOUR TURN – mouse to aim  ·  hold SPACE to charge  ·  release to drop')
      : `${curPlayer()?.name||'…'}'s turn…`;
    txt(hint, CW/2, boty+26, curPlayer()?.color||'#fff', `${fs(13)}px Arial`);
    if (isMyTurn()) drawPwrBar(boty+44);
  }

  // Game-over overlay
  if (fbState.status === 'over') {
    ctx.fillStyle='rgba(0,0,0,.75)'; ctx.fillRect(0,0,CW,CH);
    const winner = fbState.players.find(p => p.uid === fbState.winnerUid);
    const col = winner ? winner.color : '#fff';
    ctx.shadowBlur=22; ctx.shadowColor=col;
    txt(winner?`${winner.name} Wins!`:'Draw!', CW/2, CH/2-40, col, `bold ${fs(48)}px Arial`);
    ctx.shadowBlur=0;
    if (winner) txt(`Score: ${winner.score}`, CW/2, CH/2+20, '#fff', `${fs(24)}px Arial`);
    txt('Reload to play again', CW/2, CH/2+70, '#555566', `${fs(15)}px Arial`);
  }
}
</script>
